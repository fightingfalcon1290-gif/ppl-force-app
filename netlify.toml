[build]
  publish = "public"
  functions = "netlify/functions"

[dev]
  command = ""
  port = 8888

# Stripe webhook: raw body が必要なので Content-Type を維持
[functions."stripe-webhook"]
  included_files = []

[[headers]]
  for = "/sw.js"
  [headers.values]
    Service-Worker-Allowed = "/"
    Cache-Control = "no-cache"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
